<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capybara API + Spray</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&display=swap');
    
    body {
      margin: 0;
      font-family: 'Permanent Marker', cursive;
      background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #2a2a2a 10px, #2a2a2a 20px);
      height: 100vh;
      color: #fff;
      overflow: hidden;
    }
    
    .demo-content {
      padding: 40px;
      max-width: 800px;
    }
    h1 { 
      font-family: 'Bangers', cursive;
      font-size: 48px;
      margin: 0 0 16px 0;
      color: #FF1744;
      text-shadow: 3px 3px 0 #000;
      transform: rotate(-2deg);
    }
    .info {
      background: rgba(255,23,68,0.2);
      padding: 16px;
      border: 3px solid #FF1744;
      transform: rotate(1deg);
      box-shadow: 5px 5px 0 #000;
    }
    .api-status {
      margin-top: 12px;
      padding: 8px;
      background: #000;
      border: 2px solid #00E5FF;
      font-size: 12px;
    }
    
    #capy-chatbot {
      position: fixed;
      width: 100px;
      height: 100px;
      z-index: 9999;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
      filter: drop-shadow(4px 4px 0 #000);
    }
    #capy-chatbot:hover {
      transform: scale(1.1) rotate(5deg);
    }
    #capy-chatbot.sitting {
      cursor: default;
      animation: bop 0.5s infinite alternate;
    }
    @keyframes bop {
      from { transform: translateY(0) rotate(-2deg); }
      to { transform: translateY(-5px) rotate(2deg); }
    }
    
    /* SPRAY CANVAS - taguje po całym ekranie */
    #spray-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9996;
    }
    
    /* Spray particle */
    .spray-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9997;
      animation: spraySpread 1.5s ease-out forwards;
    }
    @keyframes spraySpread {
      0% { opacity: 1; transform: scale(0); }
      100% { opacity: 0; transform: scale(3); }
    }
    
    .spray-tag {
      position: fixed;
      font-family: 'Bangers', cursive;
      font-size: 42px;
      text-shadow: 3px 3px 0 #000;
      opacity: 0;
      pointer-events: none;
      z-index: 9997;
      animation: sprayFade 3s ease-out forwards;
    }
    @keyframes sprayFade {
      0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }
      15% { opacity: 1; transform: scale(1.3) rotate(8deg); }
      100% { opacity: 0.7; transform: scale(1) rotate(0deg); }
    }
    
    #capy-window {
      position: fixed;
      bottom: 120px;
      right: 20px;
      width: 380px;
      height: 520px;
      background: #1a1a1a;
      border: 4px solid #FF1744;
      box-shadow: 8px 8px 0 #000;
      display: none;
      flex-direction: column;
      z-index: 9998;
      color: #fff;
      transform: rotate(-1deg);
    }
    #capy-window.active {
      display: flex;
    }
    #capy-header {
      background: #FF1744;
      color: #000;
      padding: 12px 16px;
      font-family: 'Bangers', cursive;
      font-size: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid #000;
    }
    #capy-close {
      cursor: pointer;
      font-size: 32px;
      line-height: 1;
      font-weight: bold;
    }
    #capy-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      background: repeating-linear-gradient(0deg, #1a1a1a, #1a1a1a 2px, #222 2px, #222 4px);
    }
    .capy-msg {
      margin: 8px 0;
      padding: 10px 14px;
      max-width: 85%;
      line-height: 1.4;
      border: 2px solid #000;
    }
    .capy-msg.bot {
      background: #FF1744;
      color: #000;
      align-self: flex-start;
      box-shadow: 3px 3px 0 #000;
      transform: rotate(-1deg);
    }
    .capy-msg.user {
      background: #00E5FF;
      color: #000;
      align-self: flex-end;
      box-shadow: 3px 3px 0 #000;
      transform: rotate(1deg);
    }
    .typing {
      opacity: 0.7;
      font-style: italic;
    }
    #capy-input-area {
      display: flex;
      padding: 12px;
      background: #FF1744;
      border-top: 4px solid #000;
    }
    #capy-input {
      flex: 1;
      border: 3px solid #000;
      padding: 10px 12px;
      outline: none;
      font-size: 14px;
      font-family: 'Permanent Marker', cursive;
      background: #fff;
      color: #000;
    }
    #capy-send {
      background: #000;
      color: #FF1744;
      border: 3px solid #000;
      padding: 10px 20px;
      margin-left: 8px;
      cursor: pointer;
      font-family: 'Bangers', cursive;
      font-size: 18px;
      box-shadow: 3px 3px 0 #333;
    }
  </style>
</head>
<body>
  <div class="demo-content">
    <h1>CAPYBARA API + SPRAY</h1>
    <div class="info">
      <p><strong>YO MORDO!</strong></p>
      <p>1. Klik = YO YO YO + API call</p>
      <p>2. Siedzi = taguje sprayem cały ekran</p>
      <p>3. Nawija z osiedla przez API</p>
      <div class="api-status" id="api-status">API: Gotowe do jazdy</div>
    </div>
  </div>

  <canvas id="spray-canvas"></canvas>
  <audio id="yoyo-sound" preload="auto"></audio>

  <div id="capy-chatbot">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="65" rx="32" ry="22" fill="#000" opacity="0.3"/>
      <ellipse cx="50" cy="65" rx="30" ry="20" fill="#FF6D00"/>
      <ellipse cx="55" cy="70" rx="20" ry="12" fill="#E65100" opacity="0.6"/>
      <circle cx="50" cy="40" r="18" fill="#FF6D00"/>
      <circle cx="53" cy="43" r="12" fill="#E65100" opacity="0.6"/>
      
      <path d="M32 28 Q50 18 68 28 L63 23 Q50 15 37 23 Z" fill="#000"/>
      <ellipse cx="50" cy="30" rx="18" ry="5" fill="#212121"/>
      <text x="50" y="33" font-size="6" fill="#FF1744" text-anchor="middle" font-family="Bangers">CZEWA</text>
      
      <ellipse cx="50" cy="55" rx="8" ry="3" fill="none" stroke="#FFD600" stroke-width="2"/>
      <circle cx="42" cy="55" r="1.5" fill="#FFD600"/>
      <circle cx="50" cy="55" r="1.5" fill="#FFD600"/>
      <circle cx="58" cy="55" r="1.5" fill="#FFD600"/>
      
      <!-- SPRAY W ŁAPIE -->
      <g id="spray-can" opacity="0">
        <rect x="18" y="58" width="10" height="18" fill="#00E5FF" rx="2"/>
        <rect x="20" y="55" width="6" height="4" fill="#000"/>
        <circle cx="23" cy="54" r="2.5" fill="#FF1744"/>
        <rect x="22" y="52" width="2" height="3" fill="#FF1744"/>
      </g>
      
      <rect x="65" y="42" width="18" height="4" fill="#424242" rx="1"/>
      <circle cx="83" y="44" r="4" fill="#424242"/>
      <circle cx="85" cy="40" r="2" fill="#FF5722" opacity="0.8">
        <animate attributeName="r" values="2;3;2" dur="0.5s" repeatCount="indefinite"/>
      </circle>
      
      <path d="M42 36 L48 38 L42 40 Z" fill="#000"/>
      <path d="M58 36 L52 38 L58 40 Z" fill="#000"/>
      <circle cx="45" cy="38" r="1" fill="#FF1744"/>
      <circle cx="55" cy="38" r="1" fill="#FF1744"/>
      
      <ellipse cx="50" cy="44" rx="4" ry="3" fill="#000"/>
      <path d="M45 48 Q50 52 55 48" stroke="#000" stroke-width="2" fill="none"/>
      <rect x="49" y="48" width="2" height="3" fill="#fff"/>
      
      <ellipse cx="33" cy="80" rx="7" ry="5" fill="#E65100"/>
      <ellipse cx="67" cy="80" rx="7" ry="5" fill="#E65100"/>
      <text x="50" y="68" font-size="8" fill="#000" text-anchor="middle" font-family="Bangers" transform="rotate(-5 50 68)">SZTOS</text>
    </svg>
  </div>

  <div id="capy-window">
    <div id="capy-header">
      <span>🦫 CAPY API</span>
      <span id="capy-close">X</span>
    </div>
    <div id="capy-messages">
      <div class="capy-msg bot">YO YO YO! Capybara z API melduje się mordo 😎 Pytaj o co chcesz, pociągnę z bazy. A jak usiądę to otaguję Ci cały rejon!</div>
    </div>
    <div id="capy-input-area">
      <input type="text" id="capy-input" placeholder="Nawijaj...">
      <button id="capy-send">JAZDA!</button>
    </div>
  </div>

  <script>
  (function() {
    const capy = document.getElementById('capy-chatbot');
    const capyWindow = document.getElementById('capy-window');
    const capyClose = document.getElementById('capy-close');
    const capyInput = document.getElementById('capy-input');
    const capySend = document.getElementById('capy-send');
    const capyMessages = document.getElementById('capy-messages');
    const sprayCan = document.getElementById('spray-can');
    const canvas = document.getElementById('spray-canvas');
    const ctx = canvas.getContext('2d');
    const apiStatus = document.getElementById('api-status');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let isSitting = false;
    let posX = Math.random() * (window.innerWidth - 100);
    let posY = Math.random() * (window.innerHeight - 100);
    let velX = (Math.random() - 0.5) * 3.5;
    let velY = (Math.random() - 0.5) * 3.5;
    let sprayInterval;
    
    // KONFIGURACJA API - PODMIEŃ NA SWOJE
    const API_CONFIG = {
      url: 'https://api.openai.com/v1/chat/completions', // lub Twój endpoint
      key: 'sk-TWOJ-KLUCZ', // UWAGA: W prodzie nie trzymaj w kodzie!
      model: 'gpt-3.5-turbo'
    };
    
    // Mock API - zamień na prawdziwe
    async function callOsiedleAPI(message) {
      apiStatus.textContent = 'API: Ładuję...';
      apiStatus.style.borderColor = '#FFD600';
      
      // TU WKLEJ PRAWDZIWE API
      // const response = await fetch(API_CONFIG.url, {
      //   method: 'POST',
      //   headers: {
      //     'Content-Type': 'application/json',
      //     'Authorization': `Bearer ${API_CONFIG.key}`
      //   },
      //   body: JSON.stringify({
      //     model: API_CONFIG.model,
      //     messages: [
      //       {role: 'system', content: 'Jesteś capybarą z osiedla w Częstochowie. Mówisz slangiem, używasz "mordo", "kurde", "ja pierdziu", "sztos". Znasz Częstochowę.'},
      //       {role: 'user', content: message}
      //     ]
      //   })
      // });
      // const data = await response.json();
      // return data.choices[0].message.content;
      
      // MOCK - usuń jak podepniesz prawdziwe API
      await new Promise(r => setTimeout(r, 800));
      const mockResponses = {
        fura: `Kurde mordo, fury MPK: 10 z Wyczerpów na Dźbów zapierdala, 11 na Raków, 12 na Parkitkę. Bilet 3,40zł, nie jedź na gapę bo będzie przypał!`,
        żarcie: `Ja pierdziu gdzie wjebać? Browar Czenstochovia na Sikorskiego - żebro + browar sztos! Astoria schabowy jak u starej. Kebab u Turka na Dworcu 2 w nocy - klasyk mordo!`,
        balet: `O żesz gdzie balet? Rura na NMP, w weekendy grubo. Klub Politechnik jak studiujesz. Irish Pub na piwko. Latem Plaża Miejska - w mordę dobry klimacik!`,
        default: `Elo mordo! ${['Kurde', 'Ja pierdziu', 'O żesz', 'W mordę'][Math.floor(Math.random()*4)]} nie czaję. Pytaj: fura, żarcie, balet, co robić w Czewej!`
      };
      
      const msg = message.toLowerCase();
      let response = mockResponses.default;
      if (msg.includes('fura') || msg.includes('autobus') || msg.includes('mpk')) response = mockResponses.fura;
      else if (msg.includes('żarc') || msg.includes('jedz') || msg.includes('kebab')) response = mockResponses.żarcie;
      else if (msg.includes('balet') || msg.includes('melan') || msg.includes('klub')) response = mockResponses.balet;
      
      apiStatus.textContent = 'API: OK';
      apiStatus.style.borderColor = '#00E5FF';
      return response;
    }

    // YO YO YO dźwięk
    function playYoYoYo() {
      if ('speechSynthesis' in window) {
        const msg = new SpeechSynthesisUtterance('Yo yo yo mordo');
        msg.lang = 'pl-PL';
        msg.pitch = 0.7;
        msg.rate = 1.3;
        msg.volume = 0.8;
        speechSynthesis.speak(msg);
      }
    }

    // SPRAY SYSTEM - taguje po całym ekranie
    function sprayTag() {
      const tags = ['SZTOS', 'CZEWA', 'KOZAK', 'MORDO', 'ELO', 'GIT', 'RESPEKT', 'BLOKI', 'PÓŁNOC', 'RAKÓW'];
      const colors = ['#FF1744', '#00E5FF', '#FFD600', '#76FF03', '#E91E63'];
      const tag = tags[Math.floor(Math.random() * tags.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      const x = Math.random() * (window.innerWidth - 200) + 100;
      const y = Math.random() * (window.innerHeight - 200) + 100;
      const rotation = (Math.random() - 0.5) * 30;
      
      // Spray particles
      for (let i = 0; i < 15; i++) {
        setTimeout(() => {
          const particle = document.createElement('div');
          particle.className = 'spray-particle';
          particle.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
          particle.style.top = (y + (Math.random() - 0.5) * 60) + 'px';
          particle.style.background = color;
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 1500);
        }, i * 30);
      }
      
      // Tag text
      const sprayEl = document.createElement('div');
      sprayEl.className = 'spray-tag';
      sprayEl.textContent = tag;
      sprayEl.style.left = x + 'px';
      sprayEl.style.top = y + 'px';
      sprayEl.style.color = color;
      sprayEl.style.transform = `rotate(${rotation}deg)`;
      document.body.appendChild(sprayEl);
      setTimeout(() => sprayEl.remove(), 3000);
    }

    function moveCapy() {
      if (isSitting) return;
      posX += velX;
      posY += velY;
      if (posX <= 0 || posX >= window.innerWidth - 100) {
        velX *= -1;
        velX += (Math.random() - 0.5) * 1;
      }
      if (posY <= 0 || posY >= window.innerHeight - 100) {
        velY *= -1;
        velY += (Math.random() - 0.5) * 1;
      }
      velX = Math.max(-4, Math.min(4, velX));
      velY = Math.max(-4, Math.min(4, velY));
      capy.style.left = posX + 'px';
      capy.style.top = posY + 'px';
      capy.style.transform = velX > 0 ? 'scaleX(-1) rotate(5deg)' : 'scaleX(1) rotate(-5deg)';
      requestAnimationFrame(moveCapy);
    }
    
    async function capyRespond(text) {
      addMessage('Chwila mordo, dzwonię do ziomków...', 'bot typing');
      try {
        const response = await callOsiedleAPI(text);
        capyMessages.removeChild(capyMessages.lastChild);
        addMessage(response, 'bot');
      } catch (err) {
        capyMessages.removeChild(capyMessages.lastChild);
        addMessage(`Kurde mordo, API się wywaliło: ${err.message}`, 'bot');
        apiStatus.textContent = 'API: Błąd';
        apiStatus.style.borderColor = '#FF1744';
      }
    }
    
    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `capy-msg ${sender}`;
      if (sender === 'bot typing') {
        msg.className = 'capy-msg bot typing';
      }
      msg.textContent = text;
      capyMessages.appendChild(msg);
      capyMessages.scrollTop = capyMessages.scrollHeight;
    }
    
    function handleSend() {
      const text = capyInput.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      capyInput.value = '';
      capyRespond(text);
    }
    
    capy.addEventListener('click', () => {
      playYoYoYo();
      if (!isSitting) {
        isSitting = true;
        capy.classList.add('sitting');
        capyWindow.classList.add('active');
        capy.style.left = (window.innerWidth - 180) + 'px';
        capy.style.top = (window.innerHeight - 220) + 'px';
        capy.style.transform = 'scaleX(1) rotate(0deg)';
        sprayCan.setAttribute('opacity', '1');
        sprayTag();
        sprayInterval = setInterval(sprayTag, 2500); // taguje co 2.5s
      }
    });
    
    capyClose.addEventListener('click', () => {
      isSitting = false;
      capy.classList.remove('sitting');
      capyWindow.classList.remove('active');
      sprayCan.setAttribute('opacity', '0');
      clearInterval(sprayInterval);
      moveCapy();
    });
    
    capySend.addEventListener('click', handleSend);
    capyInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') handleSend();
    });
    
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
    
    capy.style.left = posX + 'px';
    capy.style.top = posY + 'px';
    moveCapy();
  })();
  </script>
</body>
</html>
